name: Pull Request Validation

on:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"


      - name: Lint
        run: |
          flake8 .

      - name: Run Tests
        run: |
          pytest

      - name: Build Verification
        run: |
          python -m py_compile app.py
